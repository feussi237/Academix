{% extends 'main/base.html' %}

{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body text-center">
                    <div class="mb-3">
                        <i class="bi bi-check-circle" style="font-size: 3rem; color: #28a745;"></i>
                    </div>
                    <h4 class="card-title">Logged Out Successfully</h4>
                    <p class="card-text">You have been logged out of your account.</p>
                    <p class="text-muted mb-3">Redirecting to login page...</p>
                    <a href="{% url 'login' %}" class="btn btn-primary">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Auto redirect to login after 2 seconds
    setTimeout(function() {
        window.location.href = "{% url 'login' %}";
    }, 2000);
</script>
{% endblock content %}
